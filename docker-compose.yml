version: '3.8'

services:
  # Backend API
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/mvc_proyecto_db
      - SECRET_KEY=tu_clave_secreta_para_produccion
      - DEBUG=true
    depends_on:
      - db
    volumes:
      - ./backend:/app
    # Usar FastAPI CLI para desarrollo
    command: fastapi dev app/main.py --host 0.0.0.0 --port 8000

  # Frontend Next.js
  frontend:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - backend

  # Base de datos PostgreSQL
  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=mvc_proyecto_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis para caché y sesiones
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # Adminer (opcional) - Interface web para la BD
  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data:
  redis_data:
